name: Deploy

# Despliegue automatico a GitHub Pages.
# Solo se dispara cuando algo llega a main (produccion).
on:
  push:
    branches: [main]
  workflow_dispatch:   # permite lanzarlo a mano desde la pestana Actions

# Permisos que necesita el token para publicar en Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita dos despliegues pisandose a la vez.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 1) Primero valida. Si esto falla, NO se despliega.
  validar:
    name: Validar codigo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          node --check app.js
          node --check datos.js
      - run: node -e "JSON.parse(require('fs').readFileSync('datos.json','utf8'))"

  # 2) Solo si 'validar' pasa, se publica la web.
  deploy:
    name: Publicar en GitHub Pages
    needs: validar
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # activa Pages la primera vez sin tocar ajustes

      - name: Empaquetar la web
        uses: actions/upload-pages-artifact@v3
        with:
          path: .            # todo el repo; index.html esta en la raiz

      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
