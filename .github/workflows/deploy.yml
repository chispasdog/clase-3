name: Deploy

# Despliegue continuo a GitHub Pages (modo "GitHub Actions").
# Solo se dispara al llegar algo a main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos que necesita el despliegue nativo de Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita que dos despliegues se pisen.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 1) Primero valida. Si esto falla, NO se despliega.
  validar:
    name: Validar codigo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          node --check app.js
          node --check datos.js
      - run: node -e "JSON.parse(require('fs').readFileSync('datos.json','utf8'))"

  # 2) Solo si 'validar' pasa, se publica la web.
  deploy:
    name: Publicar en GitHub Pages
    needs: validar
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Preparar la carpeta del sitio
        run: |
          mkdir _site
          cp index.html app.js datos.js datos.json _site/

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir el sitio como artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
